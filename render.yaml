services:
  # ── BACKEND (Node.js + Express + Prisma) ──────────────────────────
  - type: web
    name: smart-lms-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # Set manually — your Neon PostgreSQL connection string
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random string
      - key: AI_SERVICE_URL
        fromService:
          name: smart-lms-ai
          type: web
          property: hostport
      - key: FRONTEND_URL
        sync: false          # Set manually — your Vercel frontend URL

  # ── AI SERVICE (Python + Flask + Gemini) ───────────────────────────
  - type: web
    name: smart-lms-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false          # Set manually — your Gemini API key
      - key: BACKEND_URL
        fromService:
          name: smart-lms-backend
          type: web
          property: hostport